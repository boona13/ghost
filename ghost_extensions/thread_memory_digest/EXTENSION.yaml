name: thread_memory_digest
version: 0.1.0
description: "Digest channel thread context into concise memory entries with optional summaries"
author: ghost-ai
category: automation

requires:
  ghost_version: ">=2.0"
  deps: []
  extensions: []

provides:
  tools:
    - channel_thread_context
    - semantic_memory_save
    - digest_recent_thread_to_memory
    - digest_history_list
  routes: []
  pages:
    - thread_memory_digest
  cron_jobs: []
  settings:
    - key: max_input_chars
      type: integer
      default: 12000
      label: "Max input chars"
    - key: default_max_points
      type: integer
      default: 5
      label: "Default max digest bullets"
    - key: history_limit
      type: integer
      default: 200
      label: "Stored digest history size"

hooks:
  - on_boot
