name: example_extension
version: 0.3.0
description: "Reference extension demonstrating all Ghost extension patterns: tools, dashboard page with API routes, LLM intelligence, memory, data persistence, hooks, and settings"
author: ghost-ai
category: utility

requires:
  ghost_version: ">=2.0"
  deps: []
  extensions: []

provides:
  tools:
    - example_smart_summarize
  routes:
    - example_api
  pages:
    - id: example_extension
      label: Example
      icon: beaker
      section: system
      js_path: example_page.js
  cron_jobs: []
  settings:
    - key: max_summary_length
      type: integer
      default: 200
      label: "Max Summary Length"
      description: "Maximum word count for generated summaries"

hooks:
  - on_boot
  - on_chat_message
