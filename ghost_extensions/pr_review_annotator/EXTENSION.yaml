name: pr_review_annotator
version: 0.1.0
description: "GitHub PR review annotator with configurable rules and report history"
author: ghost-ai
category: utility

requires:
  ghost_version: ">=2.0"
  deps: []
  extensions: []

provides:
  tools:
    - review_github_pr
    - pr_review_ruleset_get
    - pr_review_ruleset_set
    - pr_review_history
  routes: []
  pages:
    - pr_review_annotator
  cron_jobs: []
  settings:
    - key: pr_review_default_mode
      type: string
      default: dry_run
      label: "Default PR review mode"
    - key: pr_review_history_limit
      type: integer
      default: 100
      label: "Max saved reports"

hooks: []
