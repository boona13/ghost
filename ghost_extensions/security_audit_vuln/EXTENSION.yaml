name: security_audit_vuln
version: 1.0.0
description: "Vulnerability scanning for Python dependencies using pip-audit. Detects CVEs with severity levels and provides auto-remediation."
author: ghost-ai
category: monitoring

requires:
  ghost_version: ">=2.0"
  deps:
    - pip-audit>=2.7.0
  extensions: []

provides:
  tools:
    - security_audit_vulnerabilities
    - security_audit_fix_vuln
  routes: []
  pages: []
  cron_jobs: []
  settings:
    - key: auto_notify_critical
      type: boolean
      default: true
      label: "Auto-notify on critical CVEs"
      description: "Send channel notification when critical vulnerabilities are detected"
    - key: severity_threshold
      type: string
      default: "medium"
      label: "Severity threshold"
      description: "Minimum severity to report: low, medium, high, or critical"

hooks:
  - on_boot
