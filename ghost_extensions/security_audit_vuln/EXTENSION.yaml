name: security_audit_vuln
version: 1.0.0
description: "Vulnerability scanning for Python dependencies using pip-audit. Detects CVEs with severity levels and provides auto-remediation."
author: ghost-ai
category: security

requires:
  ghost_version: ">=2.0"
  deps:
    - pip-audit>=2.7.0
  extensions: []

provides:
  tools:
    - security_audit_vulnerabilities
    - security_audit_fix_vuln
  routes: []
  pages: []
  cron_jobs: []
  settings:
    - key: auto_notify_critical
      type: boolean
      default: true
      label: "Auto-notify Critical"
      description: "Automatically send channel notifications when critical vulnerabilities are detected"
    - key: severity_threshold
      type: string
      default: "medium"
      label: "Severity Threshold"
      description: "Minimum severity level to report (critical/high/medium/low)"

hooks:
  - on_boot
