name: grok_video
version: 1.0.0
description: "Generate videos from text prompts using xAI's Grok Imagine Video API. Requires direct xAI API key."
author: ghost-ai
category: integration

requires:
  ghost_version: ">=2.0"
  deps:
    - requests>=2.28.0

provides:
  tools:
    - grok_video
  hooks:
    - on_boot
  routes:
    - grok_video
  pages:
    - id: grok_video
      label: "Grok Video"
      icon: "<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m22 8-6 4 6 4V8Z'/><rect width='14' height='12' x='2' y='6' rx='2' ry='2'/></svg>"
      section: integrations
      js_path: grok_video.js
