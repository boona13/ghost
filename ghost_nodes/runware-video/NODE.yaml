name: runware-video
version: 1.0.0
description: >
  Unified cloud video generation via Runware.ai middleware API.
  Access 40+ models from Kling, Runway, Minimax, Google Veo, and OpenAI Sora
  with a single API key. Text-to-video and image-to-video workflows.
  Async task-based processing with automatic polling.
author: ghost-ai
category: video
license: MIT

requires:
  gpu: false
  cloud_provider: runware
  api_key_env: RUNWARE_API_KEY
  deps: []

tools:
  - runware_text_to_video
  - runware_image_to_video
  - runware_list_models

inputs: ["text", "image"]
outputs: ["video"]

tags:
  - video
  - cloud
  - runware
  - unified
  - kling
  - runway
  - minimax
  - veo
  - sora
  - text2video
  - image2video
  - paid
