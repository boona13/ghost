dependencies:
  - torch
  - diffusers
  - transformers
  - Pillow
  - imageio
  - imageio-ffmpeg
models:
  - id: stabilityai/stable-video-diffusion-img2vid
    size_gb: 9.0
  - id: stabilityai/stable-video-diffusion-img2vid-xt
    size_gb: 9.0
