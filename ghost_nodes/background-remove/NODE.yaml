name: background-remove
version: 1.0.0
description: "Remove backgrounds from images using REMBG (U2-Net). Fast, local, no API key needed."
author: ghost-ai
category: image_generation
license: MIT

requires:
  python: ">=3.10"
  gpu: false
  vram_gb: 1
  disk_gb: 0.2
  deps: ["rembg", "Pillow"]

models:
  - id: "u2net"
    size_gb: 0.17
    default: true
  - id: "u2net_human_seg"
    size_gb: 0.17
  - id: "isnet-general-use"
    size_gb: 0.17

tools:
  - remove_background

inputs: ["image"]
outputs: ["image"]

tags: ["background-removal", "rembg", "u2net", "image-editing", "segmentation"]
