name: virtual-tryon
version: 2.0.0
description: "Virtual clothing try-on using CatVTON (ICLR 2025). Takes a person photo and garment image, transfers the garment onto the person with realistic fit and draping. Based on CatVTON ComfyUI workflow (pzc163)."
author: ghost-ai
category: image_editing
license: MIT

requires:
  python: ">=3.10"
  gpu: true
  vram_gb: 8
  disk_gb: 8
  deps: ["torch", "diffusers", "transformers", "accelerate", "safetensors", "rembg", "Pillow", "huggingface_hub"]

models:
  - id: "runwayml/stable-diffusion-inpainting"
    size_gb: 4
    default: true
    notes: "SD 1.5 Inpainting — base model for CatVTON"
  - id: "zhengchong/CatVTON"
    size_gb: 1
    notes: "CatVTON attention weights for virtual try-on"
  - id: "stabilityai/sd-vae-ft-mse"
    size_gb: 0.3
    notes: "VAE for high-quality encoding/decoding"

tools:
  - virtual_tryon

inputs: ["image"]
outputs: ["image"]

tags: ["virtual-tryon", "clothing", "fashion", "catvton", "garment-transfer"]
