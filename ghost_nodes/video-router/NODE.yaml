name: video-router
version: 1.0.0
description: >
  Smart video generation router that picks the best backend (local or cloud)
  based on quality, budget, and availability. Single entry point for all video
  generation — delegates to local Wan2.1, Kling, Runway, or Minimax as appropriate.
author: ghost-ai
category: video
license: MIT

requires:
  gpu: false
  deps: []

tools:
  - generate_video

inputs: ["text", "image"]
outputs: ["video"]

tags:
  - video
  - router
  - smart
  - local
  - cloud
  - auto
